# 完整示例：企微私域 SaaS 仅绑定 wework.syzs.top（HTTP 80 + HTTPS 443）
# 与主域 syzs.top、其它业务子域（如 ai.syzs.top、crm.syzs.top）互不共用 server 块与证书，避免串站/串证书。
#
# 你当前问题：/etc/nginx/sites-enabled/wework 里只有 server_name，没有 listen 443 和证书，
# 所以 HTTPS 会落到 conf.d/crm.conf，浏览器看到 crm 的证书。
#
# 使用步骤（ECS 上）：
# 1. 备份：sudo cp /etc/nginx/sites-enabled/wework /root/nginx-backup/wework.bak
# 2. 将本文件内容合并进 sites-available/wework（修改 root、反代端口与你的路径一致）
# 3. sudo nginx -t && sudo nginx -s reload
# 4. curl -vI https://wework.syzs.top/ | egrep subject
#
# --- 常见现状排障 ---
# A) certbot 报「/var/www/wework-saas/... does not exist」
#    说明线上静态文件不在该路径。任选其一：
#    - 把下面两个 server 里的 `root` 改成你机器上真实存在的目录（与 -w 一致），再跑 webroot；
#    - 或先建目录再放一个占位文件：sudo mkdir -p /var/www/wework-saas/frontend/dist
#    用 `grep -R "server_name.*wework" /etc/nginx/` 看当前 wework 用的 root 是哪里。
#
# B) certbot 提示「certificate already exists」并让你选 1 或 2 时，只能输入 1 / 2 或 c，不要粘贴 openssl 命令（会 **Invalid input**）。
#    若证书已在 /etc/letsencrypt/live/wework.syzs.top/，可先按 c 取消，直接去改 Nginx 挂证书（见下一条）。
#
# C) openssl 仍显示 subject=CN = crm.syzs.top（访问 wework 却拿到 crm 证）
#    说明 **Nginx 的 wework 站点没有生效的 listen 443 ssl**，443 被默认 server 或 crm 抢走。
#    处理：在 **仅** server_name wework.syzs.top 的 server 块里写上：
#      listen 443 ssl http2;
#      ssl_certificate     /etc/letsencrypt/live/wework.syzs.top/fullchain.pem;
#      ssl_certificate_key /etc/letsencrypt/live/wework.syzs.top/privkey.pem;
#    保存后 `sudo nginx -t && sudo nginx -s reload`，再跑 openssl 应出现 SAN 含 wework.syzs.top。
#    可用 `sudo nginx -T 2>/dev/null | grep -n "server_name\|ssl_certificate" | head -80` 核对各 vhost 用的证书路径。
#
# 证书路径以 Let's Encrypt 为准（你已申请成功时）：
#   /etc/letsencrypt/live/wework.syzs.top/fullchain.pem
#   /etc/letsencrypt/live/wework.syzs.top/privkey.pem
#
# 浏览器报 NET::ERR_CERT_COMMON_NAME_INVALID /「不安全」：
# - 说明当前 443 上挂的证书 SAN 里没有 wework.syzs.top（常因该 server 未 listen 443，请求落到默认 server 或 crm 的证书）。
# - 本机自检（看返回的 subject / SAN）：
#     echo | openssl s_client -connect wework.syzs.top:443 -servername wework.syzs.top 2>/dev/null | openssl x509 -noout -subject -ext subjectAltName
# - 修复：在 ECS（Ubuntu）上安装 certbot 后申请 wework 专用证书（勿在 Mac 上跑 certbot，证书在服务器签发）：
#     sudo apt update && sudo apt install -y certbot
#   webroot 必须与下面 server 块里 `root` 的绝对路径一致，勿使用中文占位「/你的webroot路径」。示例：
#     sudo certbot certonly --webroot -w /var/www/wework-saas/frontend/dist -d wework.syzs.top
#   更简单（会改 nginx 配置，慎用前先备份）：sudo certbot --nginx -d wework.syzs.top
# - HTTP 块内需保留 `location ^~ /.well-known/acme-challenge/`，否则 SPA 的 try_files 会挡住校验文件。
# - 确认本 vhost 有「listen 443 ssl」且 ssl_certificate 指向 /etc/letsencrypt/live/wework.syzs.top/ 后再 reload。

# —— HTTP：可选改成语义上的「仅 ACME + 跳转 HTTPS」（若 Certbot 已接管 80 可保持现状）
server {
    listen 80;
    listen [::]:80;
    server_name wework.syzs.top;

    root /var/www/wework-saas/frontend/dist;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/wework-saas/frontend/dist;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# —— HTTPS：必须单独一块，且证书必须是 wework.syzs.top（不能与 crm 共用）
# 前端 dist 须用「同域 /api」构建：仓库 frontend/.env.production 已设 VITE_API_URL 为空；勿把 localhost:3000 打进包，否则登录会 CORS。
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wework.syzs.top;

    ssl_certificate     /etc/letsencrypt/live/wework.syzs.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wework.syzs.top/privkey.pem;
    # 若 nginx -t 报找不到文件，可临时注释下面两行，或执行：sudo certbot --nginx -d wework.syzs.top 由 Certbot 生成
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/wework-saas/frontend/dist;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/wework-saas/frontend/dist;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
