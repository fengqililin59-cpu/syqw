# ZhiFlow 生产环境 Nginx 配置
# 域名示例：wework.syzs.top（按实际修改 server_name 和证书路径）
#
# 使用步骤：
#   1. sudo cp nginx-zhiflow-production.conf /etc/nginx/sites-available/zhiflow
#   2. sudo ln -s /etc/nginx/sites-available/zhiflow /etc/nginx/sites-enabled/zhiflow
#   3. 修改下方所有 YOUR_DOMAIN 和证书路径为实际值
#   4. sudo nginx -t && sudo nginx -s reload
#
# 前端构建产物路径（按实际修改）：
#   /var/www/zhiflow/frontend/dist
# Node.js 后端端口：3000

# ─────────────────────────────────────────────────────────────
# HTTP → HTTPS 强制跳转（保留 ACME 挑战路径）
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;   # 例如 wework.syzs.top

    # Let's Encrypt / Certbot webroot 验证
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/zhiflow/frontend/dist;
    }

    # 其余全部跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS 主站
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;   # 例如 wework.syzs.top

    # ── SSL 证书（Let's Encrypt）──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # 若 nginx -t 报找不到下两行文件，先注释掉，等 certbot 申请成功后再取消注释
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── 静态文件根目录 ────────────────────────────────────────
    root  /var/www/zhiflow/frontend/dist;
    index index.html;

    # ── 安全响应头 ────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=()" always;
    # 启用 HSTS（确认 HTTPS 稳定后再取消注释）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── 日志 ──────────────────────────────────────────────────
    access_log /var/log/nginx/zhiflow.access.log;
    error_log  /var/log/nginx/zhiflow.error.log  warn;

    # ── ACME 挑战（证书续签）────────────────────────────────
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/zhiflow/frontend/dist;
    }

    # ── 落地页（直接访问 HTML 文件，不走 SPA 回退）──────────
    location = /landing.html {
        try_files /landing.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── API 反向代理 → Node.js 3000 ──────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # 超时设置（文件上传/大批量导入可适当加长）
        proxy_connect_timeout  30s;
        proxy_read_timeout     120s;
        proxy_send_timeout     120s;

        # 上传文件大小限制（与后端 multer 保持一致）
        client_max_body_size 20m;
    }

    # ── 企微回调（如需独立日志可单独配置）──────────────────
    location /api/v1/wework/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # ── 静态资源缓存（Vite 构建产物含内容哈希）────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # ── /demo 路由 → SPA（演示模式入口）────────────────────
    # 说明：/demo 是前端 React Router 路由，需回退到 index.html
    location /demo {
        try_files $uri $uri/ /index.html;
    }

    # ── 其余所有路径 → SPA 回退 ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
