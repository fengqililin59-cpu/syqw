# HTTPS 反向代理 — 生产级 Nginx 配置
# 适用: Ubuntu/Debian，文件放 /etc/nginx/sites-available/syqw 后 ln -s 到 sites-enabled
#
# 前置条件:
#   1. 域名 DNS 已解析到本机 IP  (例如 syqw.example.com)
#   2. SSL 证书已通过 certbot 获取 (sudo certbot --nginx)
#   3. 后端 PM2 已启动 (pm2 start deploy/ecosystem.config.js)

# ---- 强制 HTTPS 跳转 ----
server {
    listen 80;
    server_name wework.syzs.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wework.syzs.top;

    # SSL 证书 (certbot 自动管理)
    ssl_certificate     /etc/letsencrypt/live/wework.syzs.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wework.syzs.top/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options         "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options  "nosniff"                            always;
    add_header X-XSS-Protection        "1; mode=block"                      always;
    add_header Referrer-Policy         "same-origin"                        always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # 日志
    access_log /var/log/nginx/syqw-access.log;
    error_log  /var/log/nginx/syqw-error.log;

    # 前端静态文件
    root /opt/syqw/frontend/dist;
    index index.html;
    charset utf-8;
    index index.html;

    # ---- API 反向代理 -> Node.js (PM2) ----
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;

        # 请求头透传
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Port   $server_port;

        # 超时
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 缓冲
        proxy_buffering off;
        proxy_request_buffering off;

        # 上传文件大小限制
        client_max_body_size 50m;
    }

    # ---- 企微回调（如需独立子域可拆为另一个 server block）----
    # location /api/v1/wework/callback { ... }

    # ---- 前端 SPA 路由 ----
    location / {
        try_files $uri $uri/ /index.html;

        # 静态文件强缓存（带 hash 的资源）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- 安全：拒绝隐藏文件 ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- 限制请求速率（登录/注册接口）----
    location /api/v1/auth/login {
        limit_req zone=login_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000/api/v1/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/auth/register {
        limit_req zone=register_zone burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000/api/v1/auth/register;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- 速率限制区 ----
limit_req_zone $binary_remote_addr zone=login_zone:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=register_zone:10m  rate=5r/m;
